name: Update CLIProxyAPI Version

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to update (empty = all)'
        required: false
        type: string
      version:
        description: 'Specific version (only used with specific edition)'
        required: false
        type: string

concurrency:
  group: update-cli-proxyapi-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare main branch
        run: git checkout -B main origin/main

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_EDITION: ${{ inputs.edition }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Edition-to-repo mapping (must match update-version.sh)
          declare -A REPOS=(
              ["cliproxyapi"]="router-for-me/CLIProxyAPI"
              ["cliproxyapi-plus"]="router-for-me/CLIProxyAPIPlus"
              ["cliproxyapi-business"]="router-for-me/CLIProxyAPIBusiness"
          )

          updates=()

          # Determine which editions to check
          if [ -n "$INPUT_EDITION" ]; then
            editions_to_check=("$INPUT_EDITION")
          else
            editions_to_check=(
              "cliproxyapi"
              "cliproxyapi-plus"
              "cliproxyapi-business"
            )
          fi

          for edition in "${editions_to_check[@]}"; do
            repo="${REPOS[$edition]}"

            echo "Checking $edition ($repo)..."

            current_version=$(
              awk -v edition="$edition" '
                $0 ~ edition" = {" { inblock = 1; next }
                inblock && /version = "/ {
                  line = $0
                  sub(/.*version = "/, "", line)
                  sub(/".*/, "", line)
                  print line
                  exit
                }
              ' flake.nix
            )

            if [ -z "$current_version" ]; then
              echo "Warning: Could not extract version for $edition, skipping"
              continue
            fi

            echo "  Current version: $current_version"

            if [ -n "$INPUT_EDITION" ] && [ -n "$INPUT_VERSION" ]; then
              new_version="$INPUT_VERSION"
            else
              new_version=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/$repo/releases/latest" | \
                jq -r '.tag_name' | sed 's/^v//')
            fi

            if [ -z "$new_version" ] || [ "$new_version" = "null" ]; then
              echo "Warning: could not fetch latest version for $edition"
              echo "Skipping"
              continue
            fi

            echo "  Latest version: $new_version"

            if [ "$current_version" != "$new_version" ]; then
              echo "  Update needed: $current_version -> $new_version"
              updates+=("$(jq -nc \
                --arg edition "$edition" \
                --arg new_version "$new_version" \
                --arg current_version "$current_version" \
                --arg repo "$repo" \
                '{edition:$edition,new_version:$new_version,current_version:$current_version,repo:$repo}'
              )")
            else
              echo "  Already at latest version"
            fi
          done

          if [ ${#updates[@]} -eq 0 ]; then
            echo '[]' > updates.json
          else
            updates_json=$(IFS=,; echo "${updates[*]}")
            printf '[%s]\n' "$updates_json" > updates.json
          fi

          echo "Update plan:"
          cat updates.json

      - name: Update version and hashes
        run: |
          set -euo pipefail

          if [ ! -s updates.json ] || \
             [ "$(jq length updates.json)" -eq 0 ]; then
            echo "No updates needed."
            exit 0
          fi

          chmod +x scripts/update-version.sh
          while IFS= read -r update; do
            edition=$(jq -r '.edition' <<<"$update")
            new_version=$(jq -r '.new_version' <<<"$update")
            echo "Updating $edition to v$new_version..."
            ./scripts/update-version.sh "$edition" "$new_version"
          done < <(jq -c '.[]' updates.json)

      - name: Commit and push to main
        run: |
          set -euo pipefail

          if git diff --quiet -- flake.nix; then
            echo "No file changes after update."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update CLIProxyAPI editions"
          git push origin HEAD:main
